# ~/.config/hypr/workspaces.conf

windowrule = workspace 5, match:class Alacritty
windowrule = workspace 1, match:class vivaldi
windowrule = workspace 8, match:class Spotify

exec-once = [workspace 5 silent] alacritty -e tmux new-session -A -s Work 
exec-once = [workspace 1 silent] vivaldi
exec-once = [workspace 8 silent] spotify
