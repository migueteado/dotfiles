customCommands:
  - key: "<c-v>"
    context: "global"
    description: "Conventional commit with gitmoji"
    prompts:
      - type: "menu"
        key: "Type"
        title: "Type of change"
        options:
          - name: "🏗️ build"
            value: "🏗️ build"
          - name: "🔧 chore"
            value: "🔧 chore"
          - name: "👷 ci"
            value: "👷 ci"
          - name: "📝 docs"
            value: "📝 docs"
          - name: "✨ feat"
            value: "✨ feat"
          - name: "🐛 fix"
            value: "🐛 fix"
          - name: "⚡️ perf"
            value: "⚡️ perf"
          - name: "♻️ refactor"
            value: "♻️ refactor"
          - name: "⏪️ revert"
            value: "⏪️ revert"
          - name: "🎨 style"
            value: "🎨 style"
          - name: "✅ test"
            value: "✅ test"
      - type: "input"
        key: "Scope"
        title: "Scope (lowercase, no parentheses — e.g. auth, api):"
      - type: "input"
        key: "Message"
        title: "Commit message:"
    command: >-
      git commit -m "{{.Form.Type}}{{if .Form.Scope}}({{.Form.Scope}}){{end}}: {{.Form.Message}}"
