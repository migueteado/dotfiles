; =========================
; COLORS
; =========================
[colors]
background = #1a1a1a
foreground = #d4d4d4
primary = #3a3a3a
secondary = #505050
alert = #a06a6a

; =========================
; BASE BAR
; =========================
[bar/base]
width = 100%
bottom = false

background = ${colors.background}
foreground = ${colors.foreground}

modules-left = i3
modules-right = volume network system date

padding-left = 2
padding-right = 2
module-margin = 2

tray-position = right

; =========================
; 1080p (DP-2)
; =========================
[bar/hd]
inherit = bar/base
monitor = ${env:MONITOR}
height = 24
font-0 = JetBrainsMono Nerd Font:size=10;2

; =========================
; 4K (DP-0)
; =========================
[bar/4k]
inherit = bar/base
monitor = ${env:MONITOR}
height = 40
font-0 = JetBrainsMono Nerd Font:size=18;2

; =========================
; MODULES
; =========================

; --- i3 workspaces ---
[module/i3]
type = internal/i3

label-focused = %name%
label-focused-background = ${colors.primary}
label-focused-foreground = ${colors.foreground}
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-padding = 2

label-visible = %name%
label-visible-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

; --- CPU ---
[module/system]
type = custom/script
exec = ~/.config/polybar/system.sh
interval = 2
format = <label>

; --- Network (auto: wifi/eth) ---
[module/network]
type = custom/script
exec = ~/.config/polybar/network.sh
interval = 3
format = <label>

; --- Date & Time ---
[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d %H:%M
label =   %date%

; --- Volume ---
[module/volume]
type = custom/script
exec = ~/.config/polybar/volume.sh
tail = true

click-right = pactl set-sink-mute @DEFAULT_SINK@ toggle
scroll-up = pactl set-sink-volume @DEFAULT_SINK@ +5%
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -5%
